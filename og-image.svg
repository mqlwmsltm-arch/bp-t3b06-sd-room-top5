    <rect x="944" y="698" width="76" height="97" rx="8" fill="#0a0a0a" opacity="0.09" transform="rotate(20, 1116, -86)"/>
    <rect x="354" y="-70" width="51" height="33" rx="8" fill="#0a0a0a" opacity="0.09" transform="rotate(32, 954, 395)"/>
    <rect x="1182" y="250" width="24" height="52" rx="8" fill="#0a0a0a" opacity="0.06" transform="rotate(35, 1013, 173)"/>
    <rect x="1229" y="285" width="37" height="46" rx="8" fill="#0a0a0a" opacity="0.10" transform="rotate(12, 759, 694)"/>
    <polygon points="417,559 511,747 323,747" fill="#1a1a2e" opacity="0.10"/>
    <polygon points="-81,566 11,750 -173,750" fill="#1a1a2e" opacity="0.09"/>
    <polygon points="17,122 57,202 -23,202" fill="#1a1a2e" opacity="0.10"/>
    <polygon points="699,3 755,115 643,115" fill="#1a1a2e" opacity="0.12"/>

  <!-- Wave at bottom -->
  <path d="M0,540 C360,585 840,495 1200,540 L1200,630 L0,630Z" fill="#1a1a2e" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
