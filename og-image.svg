<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1148" cy="606" r="55" fill="#1a1a2e" opacity="0.19"/>
    <circle cx="895" cy="636" r="50" fill="#1a1a2e" opacity="0.07"/>
    <circle cx="920" cy="631" r="51" fill="#1a1a2e" opacity="0.18"/>
    <circle cx="628" cy="500" r="89" fill="#1a1a2e" opacity="0.17"/>
    <circle cx="-96" cy="65" r="72" fill="#1a1a2e" opacity="0.13"/>
    <circle cx="175" cy="366" r="25" fill="#1a1a2e" opacity="0.17"/>
    <rect x="1253" y="207" width="66" height="50" rx="8" fill="#0a0a0a" opacity="0.10" transform="rotate(44, 1252, 253)"/>
